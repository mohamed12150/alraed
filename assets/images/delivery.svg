<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deliveryBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#deliveryBg)" opacity="0.1"/>
  
  <!-- Delivery truck -->
  <g transform="translate(100, 100)">
    <!-- Truck body -->
    <rect x="-30" y="-15" width="40" height="20" rx="3" fill="#f093fb" opacity="0.8"/>
    
    <!-- Truck cabin -->
    <rect x="-35" y="-15" width="15" height="20" rx="3" fill="#f5576c" opacity="0.9"/>
    
    <!-- Wheels -->
    <circle cx="-25" cy="10" r="6" fill="#333" opacity="0.7"/>
    <circle cx="5" cy="10" r="6" fill="#333" opacity="0.7"/>
    
    <!-- Wheel details -->
    <circle cx="-25" cy="10" r="3" fill="#666" opacity="0.5"/>
    <circle cx="5" cy="10" r="3" fill="#666" opacity="0.5"/>
    
    <!-- Packages -->
    <rect x="-25" y="-10" width="8" height="8" rx="1" fill="#fff" opacity="0.8"/>
    <rect x="-15" y="-8" width="6" height="6" rx="1" fill="#fff" opacity="0.8"/>
    
    <!-- Speed lines -->
    <path d="M -45 -5 L -40 -5 M -45 0 L -40 0 M -45 5 L -40 5" 
          stroke="#f5576c" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="70" r="4" fill="#f093fb" opacity="0.3"/>
  <circle cx="160" cy="80" r="3" fill="#f5576c" opacity="0.3"/>
  <circle cx="50" cy="140" r="5" fill="#f093fb" opacity="0.2"/>
  <circle cx="150" cy="130" r="4" fill="#f5576c" opacity="0.2"/>
</svg>
