<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="securityBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#securityBg)" opacity="0.1"/>
  
  <!-- Security shield -->
  <g transform="translate(100, 100)">
    <!-- Shield shape -->
    <path d="M 0 -30 Q -20 -25 -20 -5 Q -20 15 0 35 Q 20 15 20 -5 Q 20 -25 0 -30 Z" 
          fill="#a8edea" opacity="0.8"/>
    
    <!-- Inner shield -->
    <path d="M 0 -25 Q -15 -20 -15 -5 Q -15 10 0 25 Q 15 10 15 -5 Q 15 -20 0 -25 Z" 
          fill="#fed6e3" opacity="0.9"/>
    
    <!-- Checkmark -->
    <path d="M -8 0 L -2 8 L 12 -8" 
          stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Credit card -->
    <g transform="translate(25, 15)">
      <rect x="0" y="0" width="20" height="12" rx="2" fill="#fff" opacity="0.9"/>
      <rect x="0" y="3" width="20" height="2" fill="#a8edea" opacity="0.8"/>
      <rect x="2" y="7" width="4" height="1" fill="#fed6e3" opacity="0.8"/>
    </g>
    
    <!-- Lock icon -->
    <g transform="translate(-35, 15)">
      <rect x="0" y="5" width="12" height="8" rx="1" fill="#a8edea" opacity="0.8"/>
      <path d="M 3 5 Q 3 1 6 1 Q 9 1 9 5" 
            stroke="#fed6e3" stroke-width="2" fill="none"/>
      <circle cx="6" cy="9" r="1.5" fill="#fed6e3" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="50" r="4" fill="#a8edea" opacity="0.3"/>
  <circle cx="140" cy="60" r="3" fill="#fed6e3" opacity="0.3"/>
  <circle cx="50" cy="150" r="5" fill="#a8edea" opacity="0.2"/>
  <circle cx="150" cy="140" r="4" fill="#fed6e3" opacity="0.2"/>
</svg>
